  --green-deep:#153019;
  --green-mid:#3a7a3f;
  --lime:#a8c545;
  --lime-soft:#c3d47a;
  --sage:#a9bfa4;
  --sage-bg:#9db898;
  --gold:#e8a33d;
  --gold-soft:#f3d089;
  --yellow-spark:#f5c518;
  --bar-green:#8fae3e;
  --bar-green-dark:#5c7d2e;
  --bg-page:#f1f3f0;
  --bg-card:#ffffff;
  --text:#3c4043;
  --text-soft:#80868b;
  --border:#e4e7e2;
  --radius:10px;
  --shadow:0 1px 3px rgba(28,67,37,.10),0 1px 2px rgba(0,0,0,.05);
  --pos:#1e8e3e;
  --neg:#d93025;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg-page);color:var(--text);font-size:13px}

/* ============ Top banner ============ */

/* ---- per-school branding; html[data-school] is set from DATA.meta.school ---- */
html[data-school="RAS"]{
  --green-dark:#004712; --green-deep:#00330d; --green-mid:#2e6b3e;
  --lime:#a6ce39; --lime-soft:#c7df86; --sage:#a9bfa4; --sage-bg:#9db898;
  --gold:#eeb111; --gold-soft:#f3d089; --yellow-spark:#eeb111;
  --bar-green:#8fae3e; --bar-green-dark:#5c7d2e;
}
html[data-school="AMU"]{
  --green-dark:#1a1a1a; --green-deep:#000000; --green-mid:#4d4d4d;
  --lime:#ffc600; --lime-soft:#ffdb66; --sage:#bdbdbd; --sage-bg:#4a4a4a;
  --gold:#ffc600; --gold-soft:#ffe699; --yellow-spark:#ffc600;
  --bar-green:#d9a800; --bar-green-dark:#8f6f00;
}
html[data-school="APU"]{
  --green-dark:#0d0d0d; --green-deep:#000000; --green-mid:#3f3f3f;
  --lime:#00e5e5; --lime-soft:#8ff2f2; --sage:#bdbdbd; --sage-bg:#454545;
  --gold:#f5e400; --gold-soft:#faf3a0; --yellow-spark:#f5e400;
  --bar-green:#00b8b8; --bar-green-dark:#007a7a;
}
.banner{background:var(--green-dark);color:#fff;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;border-bottom:5px solid var(--lime)}
.brand{display:flex;align-items:center;gap:12px}
.brand .shield{width:38px;height:44px;background:var(--lime);clip-path:polygon(0 0,100% 0,100% 70%,50% 100%,0 70%);display:flex;align-items:center;justify-content:center;color:var(--green-dark);font-weight:800;font-size:20px}
.brand .name{line-height:1.05}
.brand .name b{font-size:19px;letter-spacing:.5px;font-weight:800;display:block}
.brand .name span{font-size:10px;letter-spacing:3.5px;font-weight:600;color:#dfe8d8}
.title-block{text-align:center;flex:1;min-width:260px}
.title-block h1{font-size:24px;font-style:italic;font-weight:800;letter-spacing:.3px}
.title-block h1::before,.title-block h1::after{content:"";display:inline-block;width:5px;height:22px;background:var(--lime);transform:skewX(-18deg);margin:0 14px;vertical-align:-3px}
.title-block .sub{font-size:11.5px;font-style:italic;color:#cfdcc7;margin-top:2px}
.daterange{background:#e8ebe6;color:#333;border-radius:8px;padding:9px 16px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:inset 0 0 0 1px #cdd4c9}
.daterange::after{content:"▾";color:#666}

/* ============ Nav tabs ============ */
.nav{background:#fff;display:flex;justify-content:center;gap:6px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.nav button{appearance:none;border:none;background:none;cursor:pointer;padding:13px 20px 11px;font-size:12.5px;font-weight:600;color:var(--text-soft);border-bottom:3px solid transparent;display:flex;align-items:center;gap:7px;transition:color .15s}
.nav button .ic{font-size:14px}
.nav button:hover{color:var(--green-dark)}
.nav button.active{color:#1a73e8;border-bottom-color:#1a73e8}

/* ============ Page shell ============ */
.page{display:none;max-width:1240px;margin:0 auto;padding:22px 24px 48px}
.page.active{display:block}
.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.filters .spacer{flex:1}
.filter{background:#fff;border:1px solid #d7dbd4;border-radius:8px;padding:9px 14px;font-size:12px;color:#555;min-width:200px;display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:default}
.filter::after{content:"▾";color:#999;font-size:10px}
.filter.small{min-width:150px}

/* ============ Cards & DS-style section tabs ============ */
.card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;position:relative}
.card .cardtab{display:inline-block;background:#fff;border-radius:8px 8px 0 0;padding:9px 18px 7px;font-size:12.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#2d2d2d;position:relative;top:-1px;box-shadow:0 -2px 4px rgba(0,0,0,.04)}
.card .cardtab::before{content:"";position:absolute;left:14px;bottom:5px;width:26px;height:3px;background:var(--lime)}
.card .cardbody{padding:14px 20px 20px;border-top:1px solid var(--border)}
.section-green{background:var(--sage-bg);border-radius:var(--radius);padding:20px 18px;margin-bottom:20px}
.section-green .card{margin-bottom:0}
.section-green .divider{display:flex;align-items:center;margin:20px 40px}
.section-green .divider::before,.section-green .divider::after{content:"";width:9px;height:9px;background:#fff;border-radius:50%}
.section-green .divider .line{flex:1;height:2px;background:rgba(255,255,255,.75)}

/* audience selector bars */
.aud-bar{background:#fff;border-radius:8px 8px 0 0;display:inline-flex;align-items:center;gap:8px;padding:10px 16px;font-size:13px;max-width:100%;box-shadow:0 -1px 3px rgba(0,0,0,.05);border-left:4px solid var(--lime)}
.aud-bar b{font-weight:700}
.aud-bar select{border:none;background:none;font-size:13px;font-family:inherit;color:var(--text);max-width:560px;cursor:pointer;font-weight:500}
.aud-bar select:focus{outline:none}

/* ============ Scorecard rows ============ */
.scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:6px;background:#fff;border-radius:0 10px 10px 10px;padding:18px 14px 12px;box-shadow:var(--shadow)}
.score{text-align:center;padding:4px 6px}
.score .lbl{font-size:11.5px;color:var(--text-soft);margin-bottom:6px;white-space:nowrap}
.score .val{font-size:24px;font-weight:600;color:#202124;letter-spacing:-.3px}
.score .delta{font-size:11px;font-weight:700;margin-top:2px}
.score .delta.up{color:var(--pos)}
.score .delta.down{color:var(--neg)}
.score .note{font-size:8.5px;color:#b0b4ae;margin-top:4px;line-height:1.25}
.score svg.spark{display:block;margin:8px auto 0;width:86px;height:22px}
.spark polyline{fill:none;stroke:var(--yellow-spark);stroke-width:1.6;stroke-linejoin:round;stroke-linecap:round}

/* ============ Tables ============ */
table.ds{width:100%;border-collapse:collapse;font-size:12.5px}
table.ds thead th{text-align:left;font-weight:700;color:#202124;padding:9px 10px;border-bottom:2px solid #e0e0e0;white-space:nowrap;cursor:pointer;user-select:none}
table.ds thead th.num{text-align:right}
table.ds thead th .arrow{color:#1a73e8;font-size:10px;margin-left:3px}
table.ds tbody td{padding:8px 10px;border-bottom:1px solid #f1f1f1;vertical-align:middle}
table.ds tbody tr:nth-child(even){background:#fafbf9}
table.ds tbody tr:hover{background:#f2f6ee}
table.ds td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
table.ds tfoot td{padding:10px;font-weight:700;border-top:2px solid #e0e0e0}
table.ds tfoot td.num{text-align:right}
.cellbar{display:inline-flex;align-items:center;gap:8px;justify-content:flex-end;width:100%}
.cellbar .bar{height:11px;background:var(--bar-green);border-radius:1px;display:inline-block}
.cellbar .bar.gold{background:var(--gold)}
.cellbar .bar.pale{background:var(--gold-soft)}
.cellbar .bar.limegrad{background:linear-gradient(90deg,var(--bar-green),var(--lime-soft))}
.pager{display:flex;justify-content:flex-end;align-items:center;gap:14px;color:var(--text-soft);font-size:11.5px;padding-top:10px}
.pager span.btn{cursor:pointer;font-size:14px}

/* ============ Layout grids ============ */
.grid{display:grid;gap:20px;margin-bottom:20px}
.grid.c2{grid-template-columns:1fr 1fr}
.grid.c3{grid-template-columns:1fr 1fr 1fr}
.grid.c2-1{grid-template-columns:1.1fr 1fr}
.grid .card{margin-bottom:0}
@media(max-width:960px){.grid.c2,.grid.c3,.grid.c2-1{grid-template-columns:1fr}.scores{grid-template-columns:repeat(4,1fr)}}
@media(max-width:640px){.scores{grid-template-columns:repeat(2,1fr)}.title-block h1{font-size:18px}}

/* donut legend */
.donut-wrap{display:flex;align-items:center;gap:22px;justify-content:center;padding:8px 0}
.legend{font-size:12px;display:flex;flex-direction:column;gap:7px}
.legend .li{display:flex;align-items:center;gap:8px}
.legend .sw{width:11px;height:11px;border-radius:2px;display:inline-block}

/* significance box */
.sigbox{margin-top:14px;border-radius:8px;padding:12px 16px;font-size:12.5px;line-height:1.5;background:#f4f8ee;border:1px solid #dbe7c8}
.sigbox b.win{color:var(--pos)}
.sigbox b.flat{color:#b06000}
.sigbox .small{color:var(--text-soft);font-size:11px;display:block;margin-top:4px}

/* bar chart (horizontal + vertical) */
.hbar-row{display:grid;grid-template-columns:110px 1fr 54px;align-items:center;gap:10px;padding:5px 0;font-size:12px}
.hbar-row .track{background:#f0f2ee;border-radius:2px;height:16px;position:relative}
.hbar-row .fill{background:var(--bar-green);height:100%;border-radius:2px;display:flex;align-items:center;justify-content:flex-end;color:#fff;font-size:10.5px;font-weight:600;padding-right:5px;min-width:2px}
.hbar-row .v{text-align:right;font-variant-numeric:tabular-nums;color:#555}

.footerbar{max-width:1240px;margin:0 auto;padding:0 24px 30px;color:var(--text-soft);font-size:11px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.footerbar a{color:var(--text-soft)}

.filter.fsel{cursor:pointer;gap:8px;font-weight:600;color:#444}
.filter.fsel::after{content:""}
.filter.fsel select{border:none;background:none;font-family:inherit;font-size:12px;color:#1a73e8;font-weight:700;cursor:pointer;max-width:220px}
.filter.fsel select:focus{outline:none}
.segbadge{display:inline-block;background:#fdf3dc;border:1px solid #eeda9e;color:#7a5d0e;font-size:10.5px;font-weight:600;border-radius:5px;padding:3px 8px;margin-left:10px;text-transform:none;letter-spacing:0;vertical-align:middle}
.nodata-note{background:#fff7f0;border:1px solid #f3d9bd;color:#8a5a1d;border-radius:8px;padding:10px 14px;font-size:12px;margin-top:12px}
.score .val.nd{color:#c2c6c0;font-size:20px}
</style>
</head>

function segQuery(aud){
  const ai = aud==="__site__" ? -1 : FACTS.audNames.indexOf(aud);
  let rows = FACTS.core.filter(r=>r.a===ai);
  if(!rows.length) return null;
  const dimKey = {dev:"d", ut:"u", camp:"c"};
  const segmented = { dev:rows.some(r=>r.d!=="*"), ut:rows.some(r=>r.u!=="*"), camp:rows.some(r=>r.c!=="*") };
  for(const d of ["dev","ut","camp"]){
    if(F[d]!=="All"){
      if(!segmented[d]) return null;
      rows = rows.filter(r=>r[dimKey[d]]===F[d]);
    }
  }
  if(!rows.length) return null;
  const out = {sessions:0,engaged:0,newUsers:0,users:0,rfi:0,app:0};
  rows.forEach(r=>{ out.sessions+=r.s; out.engaged+=r.e; out.newUsers+=r.n; out.users+=r.us; out.rfi+=r.r; out.app+=r.ap; });
  out.bounce = out.sessions ? (1 - out.engaged/out.sessions)*100 : 0;
  out.rfiCvr = out.sessions ? out.rfi/out.sessions*100 : 0;
  out.appCvr = out.sessions ? out.app/out.sessions*100 : 0;

}

function spark(series, w=86, h=22){
  const max = Math.max(...series), min = Math.min(...series);
  const pts = series.map((v,i)=>{
    const x = (i/(series.length-1))*w;
    const y = h-2 - ((v-min)/(max-min||1))*(h-6);
    return x.toFixed(1)+","+y.toFixed(1);
  }).join(" ");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}"><polyline points="${pts}"/></svg>`;
}

function donut(segs, size=150, hole=0.62){
  if(!segs || !segs.length) return "";
  const r=size/2, ir=r*hole; let a0=-Math.PI/2, paths="";
  segs.forEach(s=>{
    const a1=a0+(s.pct/100)*2*Math.PI;
    const large=(a1-a0)>Math.PI?1:0;
    const x0=r+r*Math.cos(a0), y0=r+r*Math.sin(a0), x1=r+r*Math.cos(a1), y1=r+r*Math.sin(a1);
    const xi1=r+ir*Math.cos(a1), yi1=r+ir*Math.sin(a1), xi0=r+ir*Math.cos(a0), yi0=r+ir*Math.sin(a0);
    paths+=`<path d="M${x0},${y0} A${r},${r} 0 ${large} 1 ${x1},${y1} L${xi1},${yi1} A${ir},${ir} 0 ${large} 0 ${xi0},${yi0} Z" fill="${s.color}"><title>${s.label}: ${s.pct}%</title></path>`;

function zTest(x1,n1,x2,n2){
  const p1=x1/n1, p2=x2/n2, p=(x1+x2)/(n1+n2);
  const se=Math.sqrt(p*(1-p)*(1/n1+1/n2));
  const z=(p2-p1)/se;
  const conf=(0.5*(1+erf(z/Math.SQRT2)))*100; // one-sided confidence that variation > control
  return {z,conf,lift:((p2-p1)/p1)*100};
}
function erf(x){ // Abramowitz–Stegun
  const s=x<0?-1:1; x=Math.abs(x);
  const t=1/(1+0.3275911*x);
  const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);
  return s*y;

  const audOptions = A.audiences.map((a,i)=>`<option value="${i}">${a.name}</option>`).join("");

  // results table computed from engine so global filters apply
  const ctrlIdx = window.__ctrlIdx??0, varIdx = window.__varIdx??1;
  let bestRev=-Infinity, bestName=null;
  const qs = A.audiences.map(a=>({a, q:segQuery(a.name)}));
  const have = qs.filter(x=>x.q);
  let tbl;
  if(!have.length){
    tbl = `<div class="nodata-note">No data for this filter combination — segment not in snapshot. Refresh via GA4 pull.</div>`;
  } else {
    const maxRfi=Math.max(...have.map(x=>x.q.rfi),1), maxApp=Math.max(...have.map(x=>x.q.app),1);
    const cq = qs[window.__ctrlIdx??0] ? qs[window.__ctrlIdx??0].q : null;
    const totS = have.reduce((s,x)=>s+x.q.sessions,0);
    qs.forEach(({a,q},i)=>{ if(!q||i===(window.__ctrlIdx??0)) return;
      const r=revenue1yr(cq,q,totS); if(r&&r.total>bestRev){bestRev=r.total;bestName=a.name;} });
    tbl=`<table class="ds"><thead><tr>
        <th>Audience name</th><th class="num">Sessions</th><th class="num">Users <span class="arrow">▼</span></th>
        <th class="num">RFI Submit</th><th class="num">CVR%</th><th class="num">RFI Lift</th><th class="num">Sig.</th>
        <th class="num">App Complete</th><th class="num">CVR%</th><th class="num">1-Yr Revenue</th>
      </tr></thead><tbody>`;
    let T={sessions:0,users:0,rfi:0,app:0};
    qs.forEach(({a,q})=>{
      if(!q){ tbl+=`<tr><td>${a.name}</td>${'<td class="num" style="color:#c2c6c0">No data</td>'.repeat(9)}</tr>`; return; }
      T.sessions+=q.sessions;T.users+=q.users;T.rfi+=q.rfi;T.app+=q.app;
      const isCtrl = qs.indexOf(qs.find(x=>x.a===a))===(window.__ctrlIdx??0);
      let liftCell='<td class="num" style="color:var(--text-soft)">Control</td><td class="num">—</td>', revCell='<td class="num">—</td>', lead='';
      if(!isCtrl && cq && cq.rfiCvr>0){
        const d=((q.rfiCvr-cq.rfiCvr)/cq.rfiCvr)*100;
        const z=zTest(cq.rfi,cq.sessions,q.rfi,q.sessions);
        const win=d>=0&&z.conf>=90;
        liftCell=`<td class="num" style="font-weight:600;color:${d>=0?'var(--pos)':'var(--neg)'}">${d>=0?'▲':'▼'} ${Math.abs(d).toFixed(1)}%</td>`+
                 `<td class="num" style="font-weight:${win?700:400};color:${win?'var(--pos)':'var(--text-soft)'}">${Math.min(z.conf,99.9).toFixed(1)}%</td>`;
        const r=revenue1yr(cq,q,totS);
        if(r) revCell=`<td class="num" style="font-weight:600;color:${r.total>=0?'var(--pos)':'var(--neg)'}">${fmtMoney(r.total)}</td>`;
        if(a.name===bestName&&bestRev>0) lead=` <span style="background:var(--gold-soft);border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;color:#5b4a12;white-space:nowrap">★ LEADING</span>`;
      } else if(!isCtrl){ liftCell='<td class="num">—</td><td class="num">—</td>'; }
      tbl+=`<tr><td>${a.name}${lead}</td><td class="num">${fmt(q.sessions)}</td><td class="num">${fmt(q.users)}</td>
        <td class="num">${cellBar(q.rfi,maxRfi,"limegrad",70)}</td>
        <td class="num"><div class="cellbar"><span>${fmtPct(q.rfiCvr)}</span><span class="bar" style="width:${Math.max(4,q.rfiCvr*9)}px"></span></div></td>
        ${liftCell}
        <td class="num">${cellBar(q.app,maxApp,"gold",60)}</td>
        <td class="num"><div class="cellbar"><span>${fmtPct(q.appCvr)}</span><span class="bar pale" style="width:${Math.max(4,q.appCvr*22)}px"></span></div></td>
        ${revCell}</tr>`;
    });
    tbl+=`</tbody><tfoot><tr><td>Grand total</td><td class="num">${fmt(T.sessions)}</td><td class="num">${fmt(T.users)}</td>
        <td class="num">${fmt(T.rfi)}</td><td class="num">${T.sessions?fmtPct(T.rfi/T.sessions*100):"–"}</td><td class="num"></td><td class="num"></td>
        <td class="num">${fmt(T.app)}</td><td class="num">${T.sessions?fmtPct(T.app/T.sessions*100):"–"}</td><td class="num"></td></tr></tfoot></table>`;
    if(!anyFilterActive()) tbl = tbl.replace("Grand total</td>","Grand total</td>"); // totals note: audiences may overlap
    tbl += `<div class="pager" style="justify-content:flex-start">Audience totals may differ slightly from sitewide totals (audiences can overlap). Lift, Sig. and 1-Yr Revenue are vs. the selected Control audience. Revenue = CRO Incremental Calculator methodology (segment ${calcSegKey()}, $${Math.round(CALC_ASSUMPTIONS.REV[(DATA.meta.school||"RAS").toUpperCase()]).toLocaleString()}/enrollment), recomputed on the current filter view.</div>`;
  }

  $$("#page-abtests").innerHTML = `
    ${globalFilters(true)}
    ${card("A/B Test Results by Audience Name", tbl + sigSummary(A.audiences[ctrlIdx].name, bestName || A.audiences[varIdx].name))}
    <div class="aud-bar"><b>Select a Control Audience:</b>
      <select id="ctrlSel">${audOptions}</select></div>
    <div id="ctrlScores"></div>
    <div style="height:20px"></div>
    <div class="section-green">
      <div class="aud-bar"><b>Select a Variation Audience:</b>
        <select id="varSel">${audOptions}</select></div>
      <div id="varScores"></div>
    </div>`;

  const draw=()=>{
    const ci=+$$("#ctrlSel").value, vi=+$$("#varSel").value;
    window.__ctrlIdx=ci; window.__varIdx=vi;
    $$("#ctrlScores").innerHTML=audienceScores(A.audiences[ci].name);
    $$("#varScores").innerHTML=audienceScores(A.audiences[vi].name, vi!==ci?A.audiences[ci].name:null);
  };
  const _oldDrawCtrl=$$("#ctrlSel");
  $$("#ctrlSel").value=ctrlIdx; $$("#varSel").value=varIdx;
  $$("#ctrlSel").onchange=()=>{window.__ctrlIdx=+$$("#ctrlSel").value;renderABTests();}; $$("#varSel").onchange=draw;
  draw();
}

      ${card("Most Viewed Pages"+LEGACY, simpleBarTable(O.mostViewedPages,["Page path","Views"],[O.mostViewedTotal],"Grand total",O.mostViewedCount))}

      ${!(O.browsers&&O.browsers.length)?"":card("Browsers & Devices"+LEGACY,`<div class="grid c2" style="margin:0;gap:24px">
          <div>${simpleBarTable(O.browsers,["Browser","Total users"],[O.browsersTotal])}</div>
          <div>${simpleBarTable(O.deviceBrands,["Device brand","Total users"],[O.browsersTotal])}</div>

      ${card("Users by Interests"+LEGACY, simpleBarTable(O.interests,["Interests","Total users"],[O.interestsTotal],"Grand total",O.interestsCount))}
      ${card("Users/Sessions by Age"+LEGACY, simpleBarTable(O.age,["Age","Total users","Sessions"],O.ageTotals,"Grand total"))}
    </div>`;
}

/* =====================================================================

   ===================================================================== */
function renderAcquisition(){
  const A=DATA.acquisition, k=A.kpis;
  const maxLP=A.landingPages.length?Math.max(...A.landingPages.map(r=>r[1])):1;
  let lp = !A.landingPages.length ? "" : `<table class="ds"><thead><tr><th>Landing page</th><th class="num">Sessions <span class="arrow">▼</span></th>
      <th class="num">RFI Submit</th><th class="num">RFI Submit CVR%</th><th class="num">App Complete</th><th class="num">App Complete CVR %</th></tr></thead><tbody>`;
  if(lp) A.landingPages.forEach(r=>{
    lp+=`<tr><td>${r[0]}</td><td class="num">${cellBar(r[1],maxLP,"",70)}</td>
      <td class="num">${fmt(r[2])}</td><td class="num">${r[3]}</td><td class="num">${fmt(r[4])}</td><td class="num">${r[5]}</td></tr>`;
  });
  if(lp) lp+=`</tbody><tfoot><tr><td>Grand total</td><td class="num">${fmt(A.landingTotals[0])}</td><td class="num">${fmt(A.landingTotals[1])}</td>
      <td class="num">${A.landingTotals[2]}</td><td class="num">${fmt(A.landingTotals[3])}</td><td class="num">${A.landingTotals[4]}</td></tr></tfoot></table>
      <div class="pager">1 – 50 / ${A.landingCount} <span class="btn">‹</span><span class="btn">›</span></div>`;

  const maxCh=A.channels.length?Math.max(...A.channels.map(c=>c[1])):1;
  const channels=!A.channels.length?"":A.channels.map(c=>`<div class="hbar-row"><div>${c[0]}</div>
      <div class="track"><div class="fill" style="width:${Math.max(1.5,(c[1]/maxCh)*100)}%">${c[1]>=300?fmt(c[1]):""}</div></div>
      <div class="v">${c[1]<300?fmt(c[1]):""}</div></div>`).join("");

  $$("#page-acquisition").innerHTML=`
    ${globalFilters(false)}
    ${(()=>{const q=segQuery("__site__");
      if(!q) return card("Sessions & Conversions by Landing Page",`<div class="nodata-note">No data for this filter combination — segment not in snapshot. Refresh via GA4 pull.</div>`);
      return card("Sessions & Conversions by Landing Page",`
      <div class="scores" style="box-shadow:none;padding:6px 0">
        ${scoreCard("Sessions",fmt(q.sessions),"",q.sessions)}
        ${scoreCard("Engaged sessions",fmt(q.engaged),engagedNote,q.engaged)}
        ${scoreCard("New users",fmt(q.newUsers),"",q.newUsers)}
        ${scoreCard("Bounce rate",fmtPct(q.bounce),"",Math.round(q.bounce*100))}
        ${scoreCard("RFI Submit",fmt(q.rfi),"",q.rfi)}
        ${scoreCard("RFI Submit CVR%",fmtPct(q.rfiCvr),"",Math.round(q.rfiCvr*1000))}
        ${scoreCard("App Complete",fmt(q.app),"",q.app)}
        ${scoreCard("App Complete CVR%",fmtPct(q.appCvr),"",Math.round(q.appCvr*1000))}
      </div>`)})()}
    ${card("Top Landing Pages"+LEGACY, lp)}
    <div class="grid c3">
      ${card("Top Channels"+LEGACY, channels)}
      ${card("Top Sources/Mediums"+LEGACY, simpleBarTable(A.sourcesMediums,["Session source / medium","Sessions","RFIs","App Complete"],A.sourcesTotals,"Grand total",A.sourcesCount))}
      ${card("Top Campaigns · GA4 test window"+segBadge(), simpleBarTable(A.campaigns,["Session campaign","Sessions","RFIs","App Complete"],A.campaignsTotals,"Grand total",A.campaignsCount))}
    </div>`;
}

/* =====================================================================
   PAGE: CLICK EVENT TRACKING (side-by-side audience comparison)
   ===================================================================== */
function renderClicks(){
  const C=DATA.clicks;
  if(!C.clickEvents || !C.clickEvents.length){
    $$("#page-clicks").innerHTML = `${globalFilters(false)}<div class="nodata-note">Click event tracking not yet pulled for this test window — requires event-scoped custom dimensions (click_text, click_id) crossed with audienceName. See skill reference ga4_queries.md §Phase 2.</div>`;
    return;
  }
  const A=DATA.abtests.audiences;
  const audOpts = `<option value="All">All audiences (unsegmented)</option>` + A.map((a,i)=>`<option value="${i}">${a.name}</option>`).join("");
  const panel = builder => {
    return sel => {
      if(sel==="All" || FACTS.clicksSegmented) return "<div>"+builder()+"</div>";
      return `<div><div class="nodata-note" style="margin-top:0">No data — click events are not audience-segmented in this snapshot. Refresh via GA4 pull (requires event-scoped custom dimensions crossed with audienceName).</div></div>`;
    };
  };
  const clickTbl=panel(()=>simpleBarTable(C.clickEvents.map(r=>[r[0],r[2],r[3]||"(not set)",r[4]]),
      ["click text","click classes","click id","# of Clicks"],[,,C.clickEventsTotal],"Grand total",C.clickEventsCount,3));
  const callTbl=panel(()=>simpleBarTable(C.clickToCall,["Click Component","Click Text","Click URL","Page path","# of Clicks"],
      [,,,C.clickToCallTotal],"Grand total",C.clickToCallCount,4));
  const degTbl=panel(()=>simpleBarTable(C.degreeSearch,["search_keyword","search_degree","search_school","# of Clicks"],
      [,,C.degreeSearchTotal],"Grand total",C.degreeSearchCount,3));

  const L = window.__clickAudL??"All", R = window.__clickAudR??"All";
  $$("#page-clicks").innerHTML=`
    ${globalFilters(false)}
    <div class="filters" style="background:#eecf6d;border-radius:10px;padding:12px 16px;align-items:center">
      <label class="filter fsel" style="flex:1">Select an Audience
        <select id="clickAudL">${audOpts}</select></label>
      <b style="font-style:italic;color:#5c4a12">--- vs. ---</b>
      <label class="filter fsel" style="flex:1">Select an Audience
        <select id="clickAudR">${audOpts}</select></label>
    </div>
    ${card("Click Event Tracking"+LEGACY,`<div class="grid c2" style="margin:0">${clickTbl(L)}${clickTbl(R)}</div>`)}
    ${card("Click to Call Event Tracking"+LEGACY,`<div class="grid c2" style="margin:0">${callTbl(L)}${callTbl(R)}</div>`)}
    ${card("Degree Search Event Tracking"+LEGACY,`<div class="grid c2" style="margin:0">${degTbl(L)}${degTbl(R)}</div>`)}`;
  $$("#clickAudL").value=L; $$("#clickAudR").value=R;
  $$("#clickAudL").onchange=e=>{window.__clickAudL=e.target.value;renderClicks();bindFilters();};
  $$("#clickAudR").onchange=e=>{window.__clickAudR=e.target.value;renderClicks();bindFilters();};
}
